<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Animation</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </head>
  <body>
    <section class="section">
      <div class="track">
        <div class="text-box box-primary"><h2> 58% </h2><span>Increase in pick up point use</span></div>
        <div class="text-box box-secondary"><h2> 27% </h2><span>Increase click-through rate</span></div>
        <div class="text-box box-tertiary">
          <h2> Delhi </h2><span>is my city</span>
        </div>
        <div class="text-box box-quaternary">
          <span style="display: flex; justify-content: center">My Email</span>
          <h3>at.best.ashish@gmail.com</h3>
        </div>

        <div class="main-ani">
          <img
            src="/lamborghini-aventador-LP-750-4-superveloce-roadster-designboom-01-818x500-Photoroom.png"
            alt="Orange Lamborghini top view"
            class="car"
            id="car"
          />
          <div class="trail" id="trail"></div>

          <div class="value-add" aria-label="WELCOME ASHISH">
            <span class="letter" aria-hidden="true">W</span>
            <span class="letter" aria-hidden="true">E</span>
            <span class="letter" aria-hidden="true">L</span>
            <span class="letter" aria-hidden="true">C</span>
            <span class="letter" aria-hidden="true">O</span>
            <span class="letter" aria-hidden="true">M</span>
            <span class="letter" aria-hidden="true">E</span>
            <span class="letter" aria-hidden="true">&nbsp;</span>
            <span class="letter" aria-hidden="true">A</span>
            <span class="letter" aria-hidden="true">S</span>
            <span class="letter" aria-hidden="true">H</span>
            <span class="letter" aria-hidden="true">I</span>
            <span class="letter" aria-hidden="true">S</span>
            <span class="letter" aria-hidden="true">H</span>
          </div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
